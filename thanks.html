<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        body{
            font-family: "Ubuntu", sans-serif;
            text-align: center;
            background: #111;
            overflow: hidden;
            margin: 120px;
        }
        .card{
            background-color:crimson;
            margin: 50px 50px 70px 170px;  
            max-width: 50%;
            padding: 25px;
            border-radius: 15px;
        }
        .innerCard{
            padding: 25px;
            box-shadow: hsl(0, 0%, 78%);
        }
        h1{
            font-size: 3.5rem;
            padding-bottom: 0;
        }
        h2{
            padding-top: -50px;
            font-weight: bold;
            color: white;
        }
        p{
            font-weight: bold;
            color: white;
        }
        #back{
            text-decoration: none;
            background: linear-gradient(-34deg, crimson, tomato);
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            padding: 10px;
        }
        #back:hover {
            cursor: pointer;
            color: greenyellow;
        }
        #back:active {
            transform: scale(0.95);
            color: green;
        }
    </style>
</head>
<body>
    <div class="card">
      <div class="innerCard">
        <h1>🙂</h1>
        <h2> Thank You!</h2>
        <P>Thanks for contacting us! We
        will get back to you as soon as
        possible</P>
        <a href="index.html" id="back" >Back</a>
      </div>
    </div>
</body>
</html>
